<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Band Revived</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<h1>Rock Band Revived</h1>
<p class="subtitle">A community-made fan pack for the Rock Band series.</p>

<div class="tabs">

<button class="tab active" onclick="switchTab('main')">
Main Setlist
</button>

<button class="tab" onclick="switchTab('dlc')">
DLC
</button>

</div>  

<input
type="text"
id="search"
placeholder="Search songs or artists..."
onkeyup="searchSongs()"
>

<p id="song-count"></p>  
  
<br><br>

<select id="sort" onchange="sortSongs()">
<option value="title">Sort by Title</option>
<option value="artist">Sort by Artist</option>
<option value="year">Sort by Year</option>
</select>

<select id="genreFilter" onchange="filterGenre()">
<option value="all">All Genres</option>
<option value="Punk">Punk</option>
<option value="Southern Rock">Southern Rock</option>
<option value="New Wave">New Wave</option>
<option value="Other">Other</option>
</select>

</header>

<main>

<div id="song-grid" class="song-grid"></div>

</main>

<footer>
<p>This project is not affiliated with Harmonix.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
