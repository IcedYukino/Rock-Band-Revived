<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Band Revived</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">

<div class="header-left">
  <img src="assets/logo.png" class="logo">
  <div class="title-group">
    <h1 class="title">Rock Band Revived</h1>
    <p class="subtitle">A community-made setlist for the Rock Band series.</p>
  </div>
</div>

<div class="header-center">

  <input
  type="text"
  id="search"
  placeholder="Search songs or artists..."
  onkeyup="searchSongs()"
  >

  <button id="randomSong">🎲 Random Song</button>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('main', this)">Main Setlist</button>
    <button class="tab" onclick="switchTab('dlc', this)">DLC</button>
  </div>

</div>

<div class="header-right">
  <p id="song-count"></p>
</div>

</header>

<main>
  <div id="song-grid" class="song-grid"></div>
</main>

<footer>
  <p>This project is not affiliated with Harmonix.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
