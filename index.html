<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Planned Songs</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="header">

<div class="header-left">

<img src="assets/logo.png" class="logo">

<div class="title-group">
<p class="subtitle">
Website is still work-in-progress, bugs are to be expected.
</p>
</div>

</div>

<div class="header-center">

<input
type="text"
id="search"
placeholder="Search songs or artists..."
onkeyup="searchSongs()"
>

<button id="randomSong" class="tab">🎲 Random Song</button>

<div class="sort-buttons">

<button onclick="sortSongs('title')">
Sort by Song
</button>

<button onclick="sortSongs('artist')">
Sort by Artist
</button>

</div>

<div class="tabs">

<button class="tab active" onclick="switchTab('all', this)">All</button>

<button class="tab" onclick="switchTab('60s', this)">
<img src="assets/60s.png">
</button>

<button class="tab" onclick="switchTab('70s', this)">
<img src="assets/70s.png">
</button>

</div>

</div>

<div class="header-right">
<p id="song-count"></p>
</div>

</header>

<main>

<div id="song-grid" class="song-grid"></div>

</main>

<footer>
<p>This project is not affiliated with Harmonix.</p>
</footer>

<div id="song-info-overlay" class="song-info-overlay">

<div class="overlay-bg"></div>

<div class="song-info-modal">

<button class="close-info" onclick="closeSongInfo()">✕</button>

<div class="info-left">
<img id="info-cover" class="song-info-cover">
</div>

<div class="info-middle">

<div id="info-title" class="info-title"></div>

<div id="info-artist" class="info-artist"></div>

<div class="info-meta">
<div id="info-album"></div>
<div id="info-year"></div>
</div>

<div class="difficulty-grid">

<div class="diff-box">
<img src="assets/guitar.png" class="diff-icon">
<div id="info-guitar"></div>
</div>

<div class="diff-box">
<img src="assets/proguitar.png" class="diff-icon">
<div id="info-proguitar"></div>
</div>

<div class="diff-box">
<img src="assets/bass.png" class="diff-icon">
<div id="info-bass"></div>
</div>

<div class="diff-box">
<img src="assets/probass.png" class="diff-icon">
<div id="info-probass"></div>
</div>

<div class="diff-box">
<img src="assets/keys.png" class="diff-icon">
<div id="info-keys"></div>
</div>

<div class="diff-box">
<img src="assets/prokeys.png" class="diff-icon">
<div id="info-prokeys"></div>
</div>

<div class="diff-box">
<img src="assets/drums.png" class="diff-icon">
<div id="info-drums"></div>
</div>

<div class="diff-box">
<img src="assets/vocals.png" class="diff-icon">
<div id="info-vocals"></div>
</div>

</div>

</div>

<div class="info-right">

<div class="info-section">
<div class="info-label">GENRE</div>
<div id="info-genre" class="info-value"></div>
</div>

<div class="info-section">
<div class="info-label">SOURCE</div>
<div id="info-source" class="info-value"></div>
</div>

<div class="info-section">
<div class="info-label">SONG RATING</div>
<div id="info-rating" class="info-value"></div>
</div>

<div class="info-section">
<div class="info-label">RELEASE</div>
<div id="info-release" class="info-value"></div>
</div>

<div class="info-section">
<div class="info-label">CHARTER</div>
<div id="info-charter" class="info-value"></div>
</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
