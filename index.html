<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setlist</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background: radial-gradient(circle at top,#1a1a1a,#000);
color:white;
}

header{
text-align:center;
padding:30px;
font-size:32px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:40px;
padding:60px;
max-width:1400px;
margin:auto;
}

.song{
position:relative;
overflow:hidden;
border-radius:16px;
background:#181818;
transition:transform .25s ease;
box-shadow:0 10px 25px rgba(0,0,0,.5);
}

.song:hover{
transform:scale(1.05);
}

.song img{
width:100%;
height:320px;
object-fit:cover;
display:block;
}

.song-info{
padding:16px;
}

.song-title{
font-size:18px;
font-weight:bold;
}

.listen{
font-size:14px;
color:#aaa;
}

.play-overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,.6);
border-radius:50%;
width:70px;
height:70px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
opacity:0;
transition:.3s;
}

.song:hover .play-overlay{
opacity:1;
}

a{
color:inherit;
text-decoration:none;
}

</style>

</head>

<body>

<header>Setlist</header>

<div class="grid">

<a href="https://youtube.com" target="_blank">
<div class="song">

<img src="shattereddreams.png">

<div class="play-overlay">▶</div>

<div class="song-info">
<div class="song-title">Shattered Dreams</div>
<div class="listen">Listen →</div>
</div>

</div>
</a>

<a href="https://youtube.com" target="_blank">
<div class="song">

<img src="Ramones - Road to Ruin.png">

<div class="play-overlay">▶</div>

<div class="song-info">
<div class="song-title">Needles and Pins</div>
<div class="listen">Listen →</div>
</div>

</div>
</a>

<a href="https://youtube.com" target="_blank">
<div class="song">

<img src="poisonwhiskey.png">

<div class="play-overlay">▶</div>

<div class="song-info">
<div class="song-title">Poison Whiskey</div>
<div class="listen">Listen →</div>
</div>

</div>
</a>

<a href="https://youtube.com" target="_blank">
<div class="song">

<img src="reachforthesky.png">

<div class="play-overlay">▶</div>

<div class="song-info">
<div class="song-title">Reach for the Sky</div>
<div class="listen">Listen →</div>
</div>

</div>
</a>

<a href="https://youtube.com" target="_blank">
<div class="song">

<img src="prisoneroflove.png">

<div class="play-overlay">▶</div>

<div class="song-info">
<div class="song-title">Tip Toe Through the Tulips</div>
<div class="listen">Listen →</div>
</div>

</div>
</a>

</div>

</body>
</html>
