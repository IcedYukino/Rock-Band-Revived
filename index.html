<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Band Revived</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
  <img src="assets/logo.png" class="logo">
<p class="subtitle">A community-made fan pack for the Rock Band series.</p>
</header>
  
<input
type="text"
id="search"
placeholder="Search songs or artists..."
onkeyup="searchSongs()"
>

<div class="tabs">

<button class="tab active" onclick="switchTab('main', this)">
Main Setlist
</button>

<button class="tab" onclick="switchTab('dlc', this)">
DLC
</button>

</div>

<p id="song-count"></p>

</header>

<main>

<div id="song-grid" class="song-grid"></div>

</main>

<footer>
<p>This project is not affiliated with Harmonix.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
